<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏠MaisonConnecté - Configuration</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#000;color:#fff;line-height:1.5}
header{display:flex;justify-content:space-between;align-items:center;background:#000;padding:15px 20px;position:sticky;top:0;border-bottom:2px solid #00ff9c;}
header h1{font-size:2.2em;color:#fff;text-align:center;width:100%;}
.burger{display:flex;flex-direction:column;width:25px;height:18px;cursor:pointer;justify-content:space-between;}
.burger div{height:3px;background:#00ff9c;border-radius:2px;}
nav{display:none;flex-direction:column;background:#000;position:absolute;top:60px;right:20px;border-radius:8px;width:180px;overflow:hidden}
nav a{color:#00ff9c;padding:12px 15px;text-decoration:none;border-bottom:1px solid rgba(0,255,150,.2)}
nav a:hover{background:#0f2650}
nav.active{display:flex}
.container{max-width:900px;margin:auto;padding:30px 20px}
h2{text-align:center;margin-bottom:30px;color:#00ff9c}
.card{background:rgba(0,255,150,.05);border:1px solid rgba(0,255,150,.2);border-radius:15px;padding:25px;margin-bottom:25px}
label{display:block;margin-top:10px}
select{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:none}
.result{background:rgba(0,255,150,.08);border:2px solid #00ff9c;border-radius:15px;padding:25px;text-align:center}
.result h3{margin-bottom:15px;color:#00ff9c;font-size:1.3em}
.total{font-size:2.4em;color:#00ff9c;margin-top:15px}
footer{text-align:center;padding:20px;border-top:2px solid #00ff9c;color:#00ff9c}
</style>
</head>
<body>

<header>
  <h1>🏠MaisonConnecté</h1>
  <div class="burger" onclick="toggleMenu()"><div></div><div></div><div></div></div>
  <nav id="menu">
    <a href="index.html">Accueil</a>
    <a href="domotique.html">Domotique</a>
    <a href="securite.html">Sécurité</a>
    <a href="config.html">Configuration</a>
  </nav>
</header>

<div class="container">

<h2>⚙️ Configuration personnalisée</h2>

<div class="card">
<h3>🪟 Volets roulants</h3>
<label>Nombre de volets :</label>
<select id="volets" onchange="calcul()">
  <option value="0">0</option>
  <option value="89">1</option>
  <option value="169">2</option>
  <option value="249">3</option>
  <option value="329">4</option>
  <option value="399">5</option>
  <option value="449">6</option>
  <option value="499">7</option>
  <option value="549">8</option>
  <option value="599">9</option>
  <option value="649">10</option>
  <option value="699">11</option>
  <option value="749">12</option>
</select>
</div>

<div class="card">
<h3>🚪 Sécurité</h3>
<label>Détecteurs ouverture :</label>
<select id="detecteurs" onchange="calcul()">
  <option value="0">0</option>
  <option value="69">1</option>
  <option value="138">2</option>
  <option value="207">3</option>
  <option value="276">4</option>
  <option value="345">5</option>
  <option value="414">6</option>
  <option value="483">7</option>
  <option value="552">8</option>
  <option value="621">9</option>
  <option value="690">10</option>
</select>

<label>📷 Caméras fixes intérieures :</label>
<select id="cameras" onchange="calcul()">
  <option value="0">0</option>
  <option value="69">1</option>
  <option value="138">2</option>
  <option value="207">3</option>
  <option value="276">4</option>
</select>
</div>

<div class="card">
<h3>🔌 Prises connectées (simulation présence)</h3>
<label>Nombre de prises :</label>
<select id="prises" onchange="calcul()">
  <option value="0">0</option>
  <option value="39">1</option>
  <option value="78">2</option>
  <option value="117">3</option>
  <option value="156">4</option>
</select>
</div>

<div class="card">
<h3>📱 Tablette avec application</h3>
<label>Ajouter une tablette :</label>
<select id="tablette" onchange="calcul()">
  <option value="0">Non</option>
  <option value="149">Oui (+149€)</option>
</select>
</div>

<div class="result">
<h3 id="packReco">🎯 Pack recommandé : —</h3>
<div class="total" id="prix">0 €</div>
</div>

</div>

<footer>&copy; 2026 🏠MaisonConnecté</footer>

<script>
function toggleMenu(){document.getElementById('menu').classList.toggle('active');}

function calcul(){
  // Récupération des valeurs
  let v = parseInt(document.getElementById("volets").value) || 0;
  let d = parseInt(document.getElementById("detecteurs").value) || 0;
  let c = parseInt(document.getElementById("cameras").value) || 0;
  let p = parseInt(document.getElementById("prises").value) || 0;
  let t = parseInt(document.getElementById("tablette").value) || 0;

  // Calcul total
  let total = v + d + c + p + t;

  // Recommandation pack volet
  let reco = [];
  if(v>0){
    if(v==1) reco.push("Volets : Pack S");
    else if(v==2) reco.push("Volets : Pack S+");
    else if(v==3) reco.push("Volets : Pack M");
    else if(v==4) reco.push("Volets : Pack M+");
    else if(v>=5 && v<=8) reco.push("Volets : Pack L");
    else if(v>=9) reco.push("Volets : Pack XL");
  }

  document.getElementById("packReco").innerHTML = "🎯 Pack recommandé : " + (reco.length?reco.join(" + "):"—");
  document.getElementById("prix").innerHTML = total + " €";
}
</script>

</body>
</html>
